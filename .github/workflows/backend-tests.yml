name: Backend tests

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # اختبارات API بحتة (playwright.config.js يستخدم fixture الـrequest فقط،
      # بلا أي متصفح) — لا حاجة لتثبيت متصفحات Playwright هنا إطلاقاً.
      - name: Run backend test suite
        run: npm test
